<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heat Haven – Checkout</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { amoled:'#000000', cardDark:'#0a0a0a', hoverDark:'#111111' } } }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family:"Poppins",sans-serif; overflow-x:hidden; }
    html { scrollbar-gutter:stable; }
    h1,h2,h3,h4,.brand { font-family:"Archivo Black",sans-serif; letter-spacing:-0.5px; }

    .mobile-menu { transform:translateX(100%); transition:transform 0.3s ease-in-out; }
    .mobile-menu.open { transform:translateX(0); }

    .page-transition { animation:fadeIn 0.5s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

    /* Dark mode icons */
    .sun-icon  { display:block; width:20px; height:20px; }
    .moon-icon { display:none;  width:20px; height:20px; }
    .dark .sun-icon  { display:none; }
    .dark .moon-icon { display:block; }

    nav { background:#fff; }
    .dark nav { background:#000; border-bottom:1px solid #1a1a1a; }

    /* Toast */
    #toast {
      position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px);
      background:#111; color:#fff; padding:10px 22px; border-radius:999px;
      font-size:13px; z-index:9999; opacity:0; transition:opacity 0.3s,transform 0.3s;
      pointer-events:none; display:flex; align-items:center; gap:8px; white-space:nowrap;
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ── Section cards ── */
    .checkout-section {
      background:#fff; border:1px solid #e5e7eb; border-radius:16px;
      transition:border-color 0.2s, box-shadow 0.2s;
      animation:fadeIn 0.4s ease both;
    }
    .dark .checkout-section { background:#0f0f0f; border-color:#1f1f1f; }
    .checkout-section:focus-within { border-color:#000; box-shadow:0 0 0 3px rgba(0,0,0,0.06); }
    .dark .checkout-section:focus-within { border-color:#444; box-shadow:0 0 0 3px rgba(255,255,255,0.04); }

    /* ── Inputs ── */
    .inp {
      width:100%; border:1.5px solid #e5e7eb; border-radius:10px;
      padding:11px 14px; font-size:14px; font-family:"Poppins",sans-serif;
      outline:none; background:#fff; color:#111;
      transition:border-color 0.2s, box-shadow 0.2s;
    }
    .inp:focus { border-color:#000; box-shadow:0 0 0 3px rgba(0,0,0,0.06); }
    .inp::placeholder { color:#aaa; }
    .dark .inp { background:#111; border-color:#2a2a2a; color:#f0f0f0; }
    .dark .inp:focus { border-color:#555; box-shadow:0 0 0 3px rgba(255,255,255,0.04); }
    .dark .inp::placeholder { color:#555; }

    /* ── Payment option cards ── */
    .pay-card {
      border:1.5px solid #e5e7eb; border-radius:12px; padding:14px 16px;
      cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:12px;
    }
    .pay-card:hover { border-color:#000; background:#fafafa; }
    .pay-card.selected { border-color:#000; background:#f5f5f5; }
    .dark .pay-card { border-color:#2a2a2a; }
    .dark .pay-card:hover { border-color:#555; background:#111; }
    .dark .pay-card.selected { border-color:#fff; background:#111; }
    .pay-radio {
      width:18px; height:18px; border-radius:50%; border:2px solid #d1d5db;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
      transition:border-color 0.2s;
    }
    .pay-card.selected .pay-radio { border-color:#000; }
    .dark .pay-card.selected .pay-radio { border-color:#fff; }
    .pay-radio-dot {
      width:8px; height:8px; border-radius:50%; background:#000;
      opacity:0; transform:scale(0); transition:opacity 0.2s, transform 0.2s;
    }
    .pay-card.selected .pay-radio-dot { opacity:1; transform:scale(1); }
    .dark .pay-card.selected .pay-radio-dot { background:#fff; }

    /* ── Address select cards ── */
    .addr-card {
      border:1.5px solid #e5e7eb; border-radius:12px; padding:14px 16px;
      cursor:pointer; transition:all 0.2s; display:flex; align-items:flex-start; gap:12px;
    }
    .addr-card:hover { border-color:#000; }
    .addr-card.selected { border-color:#000; background:#fafafa; }
    .dark .addr-card { border-color:#2a2a2a; }
    .dark .addr-card:hover { border-color:#555; }
    .dark .addr-card.selected { border-color:#fff; background:#111; }

    /* ── Order item row ── */
    .order-item { animation:fadeIn 0.3s ease both; }

    /* ── Place order button ── */
    .place-btn {
      width:100%; padding:15px; border-radius:14px; border:none; cursor:pointer;
      font-family:"Poppins",sans-serif; font-size:15px; font-weight:700;
      background:#000; color:#fff;
      transition:transform 0.2s cubic-bezier(0.22,0.61,0.36,1), box-shadow 0.2s, background 0.2s;
      box-shadow:0 6px 20px rgba(0,0,0,0.2);
    }
    .place-btn:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(0,0,0,0.3); background:#111; }
    .place-btn:active { transform:scale(0.98); }
    .dark .place-btn { background:#fff; color:#000; box-shadow:0 6px 20px rgba(255,255,255,0.08); }
    .dark .place-btn:hover { box-shadow:0 10px 28px rgba(255,255,255,0.12); }

    /* ── Step indicator ── */
    .step { display:flex; align-items:center; gap:8px; }
    .step-num {
      width:28px; height:28px; border-radius:50%; font-size:12px; font-weight:700;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
      font-family:"Archivo Black",sans-serif;
    }
    .step-num.active { background:#000; color:#fff; }
    .step-num.done   { background:#22c55e; color:#fff; }
    .step-num.future { background:#f3f4f6; color:#9ca3af; border:1.5px solid #e5e7eb; }
    .dark .step-num.active { background:#fff; color:#000; }
    .dark .step-num.done   { background:#22c55e; color:#fff; }
    .dark .step-num.future { background:#111; color:#555; border-color:#2a2a2a; }
    .step-line { flex:1; height:2px; background:#e5e7eb; border-radius:2px; min-width:24px; }
    .step-line.done { background:#22c55e; }
    .dark .step-line { background:#2a2a2a; }

    /* ── Success overlay ── */
    #success-overlay {
      position:fixed; inset:0; z-index:99999;
      background:rgba(0,0,0,0.7); backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none; transition:opacity 0.4s ease;
    }
    #success-overlay.show { opacity:1; pointer-events:all; }
    #success-box {
      background:#fff; border-radius:24px; padding:48px 40px; text-align:center;
      max-width:420px; width:90%; box-shadow:0 32px 80px rgba(0,0,0,0.3);
      transform:scale(0.88) translateY(20px); transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    #success-overlay.show #success-box { transform:scale(1) translateY(0); }
    .dark #success-box { background:#0f0f0f; border:1px solid #2a2a2a; }
    .checkmark-circle {
      width:80px; height:80px; border-radius:50%; background:#22c55e;
      display:flex; align-items:center; justify-content:center; margin:0 auto 20px;
      animation:pop-in 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
    }
    @keyframes pop-in { from{transform:scale(0)} to{transform:scale(1)} }

     /* ── Nav search pill ── */
    .nav-search-pill { display:flex; align-items:center; min-width:190px; padding:0; border-radius:999px; border:none; cursor:pointer; background:transparent; font-family:"Poppins",sans-serif; font-size:13px; font-weight:500; transition:transform 0.15s; position:relative; white-space:nowrap; }
    .nav-search-pill:hover { transform:scale(1.02); }
    .nav-search-pill .pill-border { position:absolute; inset:0; border-radius:999px; padding:2px; background:linear-gradient(100deg,#4285f4,#ea4335,#fbbc04,#34a853,#4285f4); background-size:250% 250%; animation:pill-gradient 3s ease infinite; -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0); -webkit-mask-composite:xor; mask-composite:exclude; pointer-events:none; }
    .nav-search-pill .pill-inner { display:flex; align-items:center; gap:10px; width:100%; padding:8px 18px 8px 14px; border-radius:999px; background:#f8f9fa; position:relative; z-index:1; transition:background 0.2s; }
    .nav-search-pill:hover .pill-inner { background:#fff; }
    .pill-search-icon { width:28px; height:28px; flex-shrink:0; background:linear-gradient(135deg,#4285f4,#34a853); border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .pill-search-icon svg { width:13px; height:13px; }
    .pill-label { flex:1; text-align:left; color:#5f6368; font-size:13px; }
    .pill-kbd { display:inline-flex; align-items:center; background:rgba(0,0,0,0.07); border-radius:6px; padding:2px 7px; font-size:11px; font-family:monospace; color:#999; }
    .dark .nav-search-pill .pill-inner { background:#1a1a1a; }
    .dark .nav-search-pill:hover .pill-inner { background:#222; }
    .dark .pill-label { color:#9aa0a6; }
    .dark .pill-kbd { background:rgba(255,255,255,0.07); color:#666; }
    @keyframes pill-gradient { 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }

    /* ── AI Chat ── */
    #hh-chat-widget { position:fixed; bottom:24px; left:24px; z-index:9999; font-family:"Poppins",sans-serif; }
    #hh-chat-toggle { width:60px; height:60px; border-radius:50%; background:#000; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 32px rgba(0,0,0,0.25); transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); position:relative; }
    .dark #hh-chat-toggle { background:#f0f0f0; }
    .dark #hh-chat-toggle .icon-chat svg,.dark #hh-chat-toggle .icon-close svg { stroke:#000; }
    #hh-chat-toggle:hover { transform:scale(1.1); }
    #hh-chat-toggle .toggle-icon { position:absolute; transition:opacity 0.2s ease,transform 0.2s ease; }
    #hh-chat-toggle .icon-chat  { opacity:1; transform:scale(1) rotate(0deg); }
    #hh-chat-toggle .icon-close { opacity:0; transform:scale(0.5) rotate(-90deg); }
    #hh-chat-widget.open #hh-chat-toggle .icon-chat  { opacity:0; transform:scale(0.5) rotate(90deg); }
    #hh-chat-widget.open #hh-chat-toggle .icon-close { opacity:1; transform:scale(1) rotate(0deg); }
    #hh-chat-toggle .notif-dot { position:absolute; top:2px; right:2px; width:14px; height:14px; background:#ef4444; border-radius:50%; border:2px solid white; display:none; animation:pulse-dot 2s infinite; }
    @keyframes pulse-dot { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.3);opacity:0.7} }
    #hh-chat-panel { position:absolute; bottom:76px; left:0; width:360px; height:520px; background:#fff; border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,0.18),0 0 0 1px rgba(0,0,0,0.06); display:flex; flex-direction:column; overflow:hidden; transform:scale(0.85) translateY(20px); transform-origin:bottom left; opacity:0; pointer-events:none; transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1),opacity 0.25s ease; }
    #hh-chat-widget.open #hh-chat-panel { transform:scale(1) translateY(0); opacity:1; pointer-events:all; }
    #hh-chat-header { background:#000; padding:16px 18px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
    .hh-avatar { width:40px; height:40px; background:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:"Archivo Black",sans-serif; font-size:13px; color:#000; flex-shrink:0; }
    .hh-header-name { color:#fff; font-weight:600; font-size:14px; }
    .hh-header-status { color:#a3a3a3; font-size:11px; display:flex; align-items:center; gap:5px; margin-top:2px; }
    .hh-status-dot { width:7px; height:7px; background:#22c55e; border-radius:50%; animation:pulse-dot 2s infinite; }
    #hh-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; background:#fafafa; scroll-behavior:smooth; }
    #hh-messages::-webkit-scrollbar { width:4px; }
    #hh-messages::-webkit-scrollbar-thumb { background:#ddd; border-radius:2px; }
    .hh-msg { display:flex; gap:8px; align-items:flex-end; animation:msg-in 0.3s ease; }
    @keyframes msg-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .hh-msg.bot { justify-content:flex-start; }
    .hh-msg.user { justify-content:flex-end; }
    .hh-bot-avatar { width:28px; height:28px; background:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; color:#fff; font-family:"Archivo Black",sans-serif; flex-shrink:0; }
    .hh-bubble { max-width:78%; padding:10px 14px; border-radius:18px; font-size:13px; line-height:1.5; word-wrap:break-word; }
    .hh-msg.bot .hh-bubble { background:#fff; color:#111; border-radius:18px 18px 18px 4px; box-shadow:0 1px 4px rgba(0,0,0,0.08); }
    .hh-msg.user .hh-bubble { background:#000; color:#fff; border-radius:18px 18px 4px 18px; }
    .hh-chips { display:flex; flex-wrap:wrap; gap:6px; padding:0 16px 10px; background:#fafafa; }
    .hh-chip { padding:6px 14px; background:#fff; border:1.5px solid #e5e5e5; border-radius:999px; font-size:12px; cursor:pointer; color:#333; font-family:"Poppins",sans-serif; font-weight:500; transition:all 0.2s; white-space:nowrap; }
    .hh-chip:hover { background:#000; color:#fff; border-color:#000; }
    .hh-typing { display:flex; gap:4px; align-items:center; }
    .hh-typing span { width:7px; height:7px; background:#bbb; border-radius:50%; animation:typing 1.2s infinite ease-in-out; }
    .hh-typing span:nth-child(2) { animation-delay:0.2s; }
    .hh-typing span:nth-child(3) { animation-delay:0.4s; }
    @keyframes typing { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-5px);opacity:1} }
    #hh-input-area { padding:12px 14px; background:#fff; border-top:1px solid #f0f0f0; display:flex; align-items:center; gap:8px; flex-shrink:0; }
    #hh-input { flex:1; border:1.5px solid #e5e5e5; border-radius:999px; padding:9px 16px; font-size:13px; font-family:"Poppins",sans-serif; outline:none; background:#fafafa; color:#111; transition:border-color 0.2s; }
    #hh-input:focus { border-color:#000; background:#fff; }
    #hh-input::placeholder { color:#bbb; }
    #hh-send { width:38px; height:38px; background:#000; border:none; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform 0.2s; flex-shrink:0; }
    #hh-send:hover { transform:scale(1.1); }
    .hh-powered { text-align:center; padding:6px; font-size:10px; color:#ccc; background:#fff; flex-shrink:0; }
    .dark #hh-chat-panel { background:#0a0a0a; }
    .dark #hh-messages { background:#000; }
    .dark .hh-chips { background:#000; }
    .dark .hh-msg.bot .hh-bubble { background:#111; color:#f0f0f0; box-shadow:none; }
    .dark #hh-input-area { background:#0a0a0a; border-top-color:#1a1a1a; }
    .dark #hh-input { background:#111; border-color:#222; color:#fff; }
    .dark #hh-input:focus { border-color:#555; background:#1a1a1a; }
    .dark .hh-chip { background:#111; border-color:#333; color:#ccc; }
    .dark .hh-chip:hover { background:#fff; color:#000; border-color:#fff; }
    .dark .hh-powered { background:#0a0a0a; color:#333; }
    @media (max-width:420px) { #hh-chat-panel { width:calc(100vw - 48px); } }

    .dark ::-webkit-scrollbar { width:5px; }
    .dark ::-webkit-scrollbar-track { background:#000; }
    .dark ::-webkit-scrollbar-thumb { background:#222; border-radius:3px; }
  </style>
</head>

<body class="bg-gray-50 dark:bg-amoled text-black dark:text-white transition-colors duration-300">

  <!-- SUCCESS OVERLAY -->
<div id="success-overlay">
  <div id="success-box">
    <div class="checkmark-circle">
      <i class="fas fa-check text-white text-3xl"></i>
    </div>
    <h2 class="text-2xl font-bold mb-2 dark:text-white">Order Placed!</h2>
    <p class="text-gray-500 dark:text-zinc-500 text-sm mb-1">Your sneakers are on their way 👟</p>
    <p class="text-gray-400 dark:text-zinc-600 text-xs mb-6">Order ID: <span id="order-id" class="font-semibold text-black dark:text-white"></span></p>
    <div class="flex flex-col gap-3">
      <a href="product.html" class="block w-full bg-black dark:bg-white text-white dark:text-black py-3 rounded-xl font-semibold text-sm hover:opacity-80 transition">Continue Shopping</a>
      <a href="orders.html" class="block w-full border border-gray-200 dark:border-zinc-700 text-gray-600 dark:text-zinc-400 py-3 rounded-xl font-medium text-sm hover:bg-gray-50 dark:hover:bg-zinc-900 transition">View My Orders</a>
    </div>
  </div>
</div>
